<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>WebSocket Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <link rel="stylesheet" href="/assets/app.css">
</head>
<body>

<div class="top-chrome">
    <header>
        <div class="status">
            <span class="dot" id="dot"></span>
            <span id="statusText">connecting…</span>
        </div>
        <div class="header-actions">
            <button type="button" class="btn btn-ghost" id="autosaveBtn" onclick="toggleAutosave()" aria-pressed="false">Autosave</button>
            <div class="mode-switch mode-switch--mobile">
                <button type="button" class="btn btn-ghost" id="toggleBtn" onclick="togglePreview()">Preview</button>
            </div>
            <div class="mode-switch mode-switch--desktop" role="group" aria-label="Editor or preview">
                <button type="button" class="btn btn-ghost mode-seg" id="editModeBtn" onclick="setEditorMode()">Edit</button>
                <button type="button" class="btn btn-ghost mode-seg" id="previewModeBtn" onclick="setPreviewMode()">Preview</button>
            </div>
            <button type="button" class="btn btn-ghost btn-header-icon" data-refresh-trigger onclick="refreshFromServer()" title="Reload from disk" aria-label="Reload from disk">
                <!-- Filled icon: multi-stroke “refresh” arcs overlap at small sizes and look glitched. -->
                <svg class="btn-header-icon__svg btn-header-icon__svg--fill" width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                    <path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
                    <path fill-rule="evenodd" d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
                </svg>
            </button>
            <button type="button" class="btn btn-ghost btn-save-icon" id="saveBtnDesktop" onclick="saveToServer()" aria-label="Save">
                <svg class="btn-header-icon__svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                    <polyline points="17 21 17 13 7 13 7 21"/>
                    <polyline points="7 3 7 8 15 8"/>
                </svg>
            </button>
            <span class="save-hint save-hint--header" id="saveHintDesktop" aria-live="polite"></span>
        </div>
    </header>
</div>

<div class="save-bar save-bar--mobile" id="saveBarMobile">
    <button type="button" class="btn btn-ghost btn-refresh-mobile" data-refresh-trigger onclick="refreshFromServer()" title="Reload from disk" aria-label="Reload from disk">
        <svg class="btn-header-icon__svg btn-header-icon__svg--fill" width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
            <path fill-rule="evenodd" d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
        </svg>
    </button>
    <button type="button" class="btn btn-primary btn-save-wide" id="saveBtnMobile" onclick="saveToServer()">
        <svg class="btn-header-icon__svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
            <polyline points="7 3 7 8 15 8"/>
        </svg>
        Save
    </button>
    <span class="save-hint save-hint--mobile" id="saveHintMobile" aria-live="polite"></span>
</div>

<main>
    <div id="editorShell">
        <div class="format-toolbar" id="formatToolbar" aria-label="Markdown formatting">
            <button type="button" class="fmt-btn" data-fmt="undo" title="Undo (Ctrl+Z)">↶</button>
            <button type="button" class="fmt-btn" data-fmt="redo" title="Redo (Ctrl+Shift+Z)">↷</button>
            <span class="fmt-sep" aria-hidden="true"></span>
            <button type="button" class="fmt-btn" data-fmt="indent" title="Indent (Tab)">→</button>
            <button type="button" class="fmt-btn" data-fmt="outdent" title="Outdent (Shift+Tab)">←</button>
            <span class="fmt-sep" aria-hidden="true"></span>
            <button type="button" class="fmt-btn" data-fmt="bold" title="Bold (Ctrl+B)"><strong>B</strong></button>
            <button type="button" class="fmt-btn" data-fmt="italic" title="Italic (Ctrl+I)"><em>I</em></button>
            <button type="button" class="fmt-btn" data-fmt="code" title="Inline code">`</button>
            <span class="fmt-sep" aria-hidden="true"></span>
            <button type="button" class="fmt-btn" data-fmt="h1" title="Title (H1)">H1</button>
            <button type="button" class="fmt-btn" data-fmt="h2" title="Heading">H2</button>
            <button type="button" class="fmt-btn" data-fmt="h3" title="Subheading">H3</button>
            <span class="fmt-sep" aria-hidden="true"></span>
            <button type="button" class="fmt-btn" data-fmt="bullet" title="Bullet list">•</button>
            <button type="button" class="fmt-btn" data-fmt="ordered" title="Numbered list">1.</button>
            <button type="button" class="fmt-btn" data-fmt="quote" title="Blockquote">&gt;</button>
            <span class="fmt-sep" aria-hidden="true"></span>
            <button type="button" class="fmt-btn" data-fmt="link" title="Link">[]</button>
            <span class="fmt-sep" aria-hidden="true"></span>
            <button type="button" class="fmt-btn" data-fmt="strike" title="Strikethrough">~~</button>
            <button type="button" class="fmt-btn" data-fmt="hr" title="Horizontal rule">—</button>
            <button type="button" class="fmt-btn" data-fmt="codeblock" title="Fenced code block">{ }</button>
        </div>
        <textarea id="editor" placeholder="Start typing…" spellcheck="true"></textarea>
    </div>
    <div id="preview"></div>
</main>

<div id="toast">Saved</div>

<script>window.__INITIAL_DATA__ = {{.Data}};</script>
<script src="/assets/app.js"></script>
</body>
</html>
